kind = "web"
previewPath = "/"
title = "Attendance Dashboard"
version = "1.0.0"
id = "artifacts/attendance-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25183

[services.development]
run = "pnpm --filter @workspace/attendance-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/attendance-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/attendance-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25183"
BASE_PATH = "/"
